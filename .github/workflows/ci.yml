name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/gridsense --ignore-missing-imports

  # ── 2. Unit tests (no external services) ──────────────────────────────────
  test-unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=gridsense \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ── 3. Integration tests (needs TimescaleDB) ───────────────────────────────
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: gridsense
          POSTGRES_PASSWORD: gridsense
          POSTGRES_DB: gridsense_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://gridsense:gridsense@localhost:5432/gridsense_test
        run: |
          pytest tests/integration/ \
            --cov=gridsense \
            --cov-report=xml \
            -v

  # ── 4. Docker build check ──────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t gridsense-api:ci .

      - name: Build dashboard image
        run: docker build -f docker/Dockerfile.dashboard -t gridsense-dashboard:ci .
