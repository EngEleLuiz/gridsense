app = "gridsense-api"
primary_region = "gru"  # São Paulo — closest to Florianópolis

[build]
  dockerfile = "docker/Dockerfile.api"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true   # free tier: stops when idle
  auto_start_machines = true  # wakes on request
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    port = 8000
    timeout = "5s"
    type = "http"
